[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # Pin the FUNCTION runtime to Node 20 too. @sparticuz/chromium reads this to pick its
  # shared-lib bundle: without "20.x"/"22.x" it extracts al2.tar.br, which lacks
  # libnspr4.so, and Chromium fails to launch ("error while loading shared libraries").
  # nodejs20.x makes it extract al2023.tar.br (the bundle that ships libnspr4).
  AWS_LAMBDA_JS_RUNTIME = "nodejs20.x"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  # The browser engine + stealth plugin must not be inlined by esbuild:
  #  - @sparticuz/chromium ships a brotli-packed Chromium binary esbuild can't bundle.
  #  - puppeteer-extra-plugin-stealth loads its evasions via dynamic require() which
  #    esbuild can't statically resolve. Keep all of them external and ship from node_modules.
  external_node_modules = [
    "@sparticuz/chromium",
    "puppeteer-core",
    "puppeteer-extra",
    "puppeteer-extra-plugin",
    "puppeteer-extra-plugin-stealth",
    "puppeteer-extra-plugin-user-preferences",
    "puppeteer-extra-plugin-user-data-dir"
  ]
  # esbuild/ZISI can't trace the dynamic require()s the stealth plugin uses — both its
  # evasion submodules (evasions/chrome.app …) and its sibling plugins, which
  # puppeteer-extra loads by name at runtime (user-preferences → user-data-dir). Any one
  # missing makes the plugin throw and the capture returns 0 requests. Force-ship the
  # entire puppeteer-extra plugin family so nothing is resolved lazily off-disk.
  included_files = [
    "node_modules/@sparticuz/chromium/bin/**",
    "node_modules/@types/debug/**",
    "node_modules/@types/ms/**",
    "node_modules/arr-union/**",
    "node_modules/balanced-match/**",
    "node_modules/brace-expansion/**",
    "node_modules/clone-deep/**",
    "node_modules/concat-map/**",
    "node_modules/debug/**",
    "node_modules/deepmerge/**",
    "node_modules/for-in/**",
    "node_modules/for-own/**",
    "node_modules/fs-extra/**",
    "node_modules/fs.realpath/**",
    "node_modules/glob/**",
    "node_modules/graceful-fs/**",
    "node_modules/inflight/**",
    "node_modules/inherits/**",
    "node_modules/is-buffer/**",
    "node_modules/is-extendable/**",
    "node_modules/is-plain-object/**",
    "node_modules/isobject/**",
    "node_modules/jsonfile/**",
    "node_modules/kind-of/**",
    "node_modules/lazy-cache/**",
    "node_modules/merge-deep/**",
    "node_modules/minimatch/**",
    "node_modules/mixin-object/**",
    "node_modules/ms/**",
    "node_modules/once/**",
    "node_modules/path-is-absolute/**",
    "node_modules/puppeteer-extra/**",
    "node_modules/puppeteer-extra-plugin/**",
    "node_modules/puppeteer-extra-plugin-stealth/**",
    "node_modules/puppeteer-extra-plugin-user-data-dir/**",
    "node_modules/puppeteer-extra-plugin-user-preferences/**",
    "node_modules/rimraf/**",
    "node_modules/shallow-clone/**",
    "node_modules/universalify/**",
    "node_modules/wrappy/**"
  ]

# Clean URL for the streaming scan function (must come BEFORE the SPA fallback).
[[redirects]]
  from = "/api/scan"
  to = "/.netlify/functions/scan"
  status = 200

# SPA fallback — every other path serves the app shell.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  framework = "vite"
  targetPort = 5173
