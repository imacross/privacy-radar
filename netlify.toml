[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  # The browser engine + stealth plugin must not be inlined by esbuild:
  #  - @sparticuz/chromium ships a brotli-packed Chromium binary esbuild can't bundle.
  #  - puppeteer-extra-plugin-stealth loads its evasions via dynamic require() which
  #    esbuild can't statically resolve. Keep all of them external and ship from node_modules.
  external_node_modules = [
    "@sparticuz/chromium",
    "puppeteer-core",
    "puppeteer-extra",
    "puppeteer-extra-plugin",
    "puppeteer-extra-plugin-stealth",
    "puppeteer-extra-plugin-user-preferences",
    "puppeteer-extra-plugin-user-data-dir"
  ]
  # esbuild/ZISI can't trace the dynamic require()s the stealth plugin uses — both its
  # evasion submodules (evasions/chrome.app …) and its sibling plugins, which
  # puppeteer-extra loads by name at runtime (user-preferences → user-data-dir). Any one
  # missing makes the plugin throw and the capture returns 0 requests. Force-ship the
  # entire puppeteer-extra plugin family so nothing is resolved lazily off-disk.
  included_files = [
    "node_modules/@sparticuz/chromium/bin/**",
    "node_modules/puppeteer-extra/**",
    "node_modules/puppeteer-extra-plugin/**",
    "node_modules/puppeteer-extra-plugin-stealth/**",
    "node_modules/puppeteer-extra-plugin-user-preferences/**",
    "node_modules/puppeteer-extra-plugin-user-data-dir/**"
  ]

# Clean URL for the streaming scan function (must come BEFORE the SPA fallback).
[[redirects]]
  from = "/api/scan"
  to = "/.netlify/functions/scan"
  status = 200

# SPA fallback — every other path serves the app shell.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  framework = "vite"
  targetPort = 5173
